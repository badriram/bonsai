name: bonsai-maintenance

# Operator-side maintenance. Runs in the Bonsai repo, NOT in consuming app repos.
# Consuming apps' CI only ever runs `bonsai grow`.
#
# Currently manual-only: there is nothing to bake or rotate yet (bake-image and
# the cluster registry land in Phase 1.5 / Phase 2). The weekly schedule will
# be re-enabled then.

on:
  workflow_dispatch:
    inputs:
      action:
        description: "What to run"
        type: choice
        options: [bake-image, rotate-workers]
        default: bake-image

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - run: go build -o bonsai ./cmd/bonsai
      - run: |
          echo "Selected action: ${{ inputs.action }}"
          echo "Maintenance verbs not yet implemented; see Phase 1.5 in docs/operator.md."
          exit 0
